<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe | Game</title>
    <link rel="stylesheet" href="./game.css">
    <script src="./game.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hedvig+Letters+Serif:opsz@12..24&display=swap" rel="stylesheet">
</head>
<body>
    <div class="mainContentGame">
        <header>
            <h1>TIC - TAC - TOE</h1>
        </header>
        <main>
            <div class="statCont">
                <span class="tlCorner corner"></span>
                <span class="trCorner corner"></span>
                <span class="blCorner corner"></span>
                <span class="brCorner corner"></span>
                <div class="player1">
                    <div class="playerName1">phN</div>
                    <div class="mark1">X</div>
                    <div class="winNumber1">0</div>
                    <div class="winText1">WINS</div>
                </div>
                <svg class="horizontalSeparator" width="3" height="68" viewBox="0 0 3 68" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M1.5 1.5V66.5" stroke="url(#paint0_radial_98_245)" stroke-width="3" stroke-linecap="round"/>
                    <defs>
                        <radialGradient id="paint0_radial_98_245" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1 34) rotate(90) scale(32.5 0.5)">
                            <stop stop-color="#555E62"/>
                            <stop offset="1" stop-color="#ADC0C8" stop-opacity="0"/>
                        </radialGradient>
                    </defs>
                </svg>
                <svg class="verticalSeparator" viewBox="0 0 134 3" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
                    <path d="M1.5 1.5H132.5" stroke="url(#paint0_radial_98_3)" stroke-width="3" stroke-linecap="round"/>
                    <defs>
                        <radialGradient id="paint0_radial_98_3" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(67 2) scale(65.5 0.5)">
                            <stop stop-color="#555E62"/>
                            <stop offset="1" stop-color="#ADC0C8" stop-opacity="0"/>
                        </radialGradient>
                    </defs>
                </svg>
                <div class="currentTurn">
                    <div class="currentTurnText">CURRENT <br>TURN</div>
                    <div class="currentTurnMarkCont">
                        <div class="CTXCont">
                            <div class="currentTurnX opacityUpX">X</div>
                        </div>
                        <div class="CTOCont">
                            <div class="currentTurnO">O</div>
                        </div>
                    </div>
                </div>
                <svg class="horizontalSeparator" width="3" height="68" viewBox="0 0 3 68" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M1.5 1.5V66.5" stroke="url(#paint0_radial_98_24)" stroke-width="3" stroke-linecap="round"/>
                    <defs>
                        <radialGradient id="paint0_radial_98_24" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1 34) rotate(90) scale(32.5 0.5)">
                            <stop stop-color="#555E62"/>
                            <stop offset="1" stop-color="#ADC0C8" stop-opacity="0"/>
                        </radialGradient>
                    </defs>
                </svg>

                <svg class="verticalSeparator" viewBox="0 0 134 3" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
                    <path d="M1.5 1.5H132.5" stroke="url(#paint0_radial_98_2)" stroke-width="3" stroke-linecap="round"/>
                    <defs>
                        <radialGradient id="paint0_radial_98_2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(67 2) scale(65.5 0.5)">
                            <stop stop-color="#555E62"/>
                            <stop offset="1" stop-color="#ADC0C8" stop-opacity="0"/>
                        </radialGradient>
                    </defs>
                </svg>
                <div class="player2">
                    <div class="playerName2">phN</div>
                    <div class="mark2">O</div>
                    <div class="winNumber2">0</div>
                    <div class="winText2">WINS</div>
                </div>
            </div>
            <div class="mainBoard">
                
                <div class="boardWrapper">
                    
                    
                    <div class="board">
                    <span class="tlCorner corner"></span>
                    <span class="trCorner corner"></span>
                    <span class="blCorner corner"></span>
                    <span class="brCorner corner"></span>

                    <svg class="gridLine1" viewBox="0 0 134 3" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
                        <path d="M1.5 1.5H132.5" stroke="url(#paint0_radial_98_213)" stroke-width="1" stroke-linecap="round"/>
                        <defs>
                            <radialGradient id="paint0_radial_98_213" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(67 2) scale(65.5 0.5)">
                                <stop stop-color="#555E62"/>
                                <stop offset="1" stop-color="#ADC0C8" stop-opacity="0"/>
                            </radialGradient>
                        </defs>
                    </svg>

                    <svg class="gridLine2" viewBox="0 0 134 3" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
                        <path d="M1.5 1.5H132.5" stroke="url(#paint0_radial_98_214)" stroke-width="1" stroke-linecap="round"/>
                        <defs>
                            <radialGradient id="paint0_radial_98_214" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(67 2) scale(65.5 0.5)">
                                <stop stop-color="#555E62"/>
                                <stop offset="1" stop-color="#ADC0C8" stop-opacity="0"/>
                            </radialGradient>
                        </defs>
                    </svg>
                    <svg class="gridLine3" viewBox="0 0 3 134" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
                        <path d="M1.5 1.5V132.5" stroke="url(#paint0_radial_98_288)" stroke-width="1" stroke-linecap="round"/>
                        <defs>
                            <radialGradient id="paint0_radial_98_288" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1 67) rotate(90) scale(65.5 0.5)">
                                <stop stop-color="#555E62"/>
                                <stop offset="1" stop-color="#ADC0C8" stop-opacity="0"/>
                            </radialGradient>
                        </defs>
                    </svg>
                    <svg class="gridLine4" viewBox="0 0 3 134" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
                        <path d="M1.5 1.5V132.5" stroke="url(#paint0_radial_98_2889)" stroke-width="1" stroke-linecap="round"/>
                        <defs>
                            <radialGradient id="paint0_radial_98_2889" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1 67) rotate(90) scale(65.5 0.5)">
                                <stop stop-color="#555E62"/>
                                <stop offset="1" stop-color="#ADC0C8" stop-opacity="0"/>
                            </radialGradient>
                        </defs>
                    </svg>
                    <canvas class="winCanvas"></canvas>
                        <div class="piece" id="P1"></div>
                        <div class="piece" id="P2"></div>
                        <div class="piece" id="P3"></div>
                        <div class="piece" id="P4"></div>
                        <div class="piece" id="P5"></div>
                        <div class="piece" id="P6"></div>
                        <div class="piece" id="P7"></div>
                        <div class="piece" id="P8"></div>
                        <div class="piece" id="P9"></div>
                    </div>
                </div>
                <div class="currentTurnPlayerNameInsert"></div>
                <div class="afterVictory"></div>
            </div>
            <div class="controlCont">
                <span class="tlCorner corner"></span>
                <span class="trCorner corner"></span>
                <span class="blCorner corner"></span>
                <span class="brCorner corner"></span>
                <button class="newGame">
                    <span class="tlCorner corner1"></span>
                    <span class="trCorner corner1"></span>
                    <span class="blCorner corner1"></span>
                    <span class="brCorner corner1"></span>
                    NEW GAME
                </button>
                <button class="rematch">
                    <span class="tlCorner corner2"></span>
                    <span class="trCorner corner2"></span>
                    <span class="blCorner corner2"></span>
                    <span class="brCorner corner2"></span>
                    REMATCH
                </button>
                <button class="quit">
                    <span class="tlCorner corner3"></span>
                    <span class="trCorner corner3"></span>
                    <span class="blCorner corner3"></span>
                    <span class="brCorner corner3"></span>
                    QUIT
                </button>
            </div>
        </main>
    </div>
</body>
</html>
