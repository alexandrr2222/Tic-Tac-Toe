<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe | Game</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hedvig+Letters+Serif:opsz@12..24&display=swap" rel="stylesheet">
</head>
<body>
    <div class="mainContentGame">
        <header>
            <h1>TIC - TAC - TOE</h1>
        </header>
        <main>
            <div class="statCont">
                <div class="player1">
                    <div class="playerName1"></div>
                    <div class="mark1"></div>
                    <div class="winNumber1"></div>
                    <div class="winText">WINS</div>
                </div>
                <div class="currentTurn">
                    <div class="currentTurnText">CURRENT TURN</div>
                    <div class="currentTurnMarkCont">
                        <div class="currentTurnX">X</div>
                        <div class="currentTurnO">O</div>
                    </div>
                    <div class="currentTurnPlayerName">
                        <span class="currentTurnPlayerNameInsert">placeholder</span>'S TURN
                    </div>
                </div>
                <div class="player2">
                    <div class="playerName2"></div>
                    <div class="mark2"></div>
                    <div class="winNumber2"></div>
                    <div class="winText">WINS</div>
                </div>
            </div>
            <div class="mainBoard">
                <div class="piece1"></div>
                <div class="piece2"></div>
                <div class="piece3"></div>
                <div class="piece4"></div>
                <div class="piece5"></div>
                <div class="piece6"></div>
                <div class="piece7"></div>
                <div class="piece8"></div>
                <div class="piece9"></div>
            </div>
            <div class="controlCont">
                <button>REMATCH</button>
                <button>QUIT</button>
            </div>
        </main>
    </div>
</body>
</html>
